<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ditto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="stylesheet" href="index.css">
</head>

<body>
<h2>ditto image generator : test viewer</h2>
<div>
    <h3>{{testName}}</h3>
    <h3>generated under id <code>{{id}}</code><br/>took <code>{{time}}ms</code></h3>
</div>
<div class="view-result">
    <div class="menu">
        <button onclick="window.location.href = '/testing';">back to home</button>
        <button onclick="window.location.href = '/results/{{id}}.jpg';">download</button>
        <button id="reload-button">regenerate from new blueprint</button>
        <button onclick="localStorage.setItem('ditto:reload', (parseInt(localStorage.getItem('ditto:reload')) ? 0 : 1).toString());">auto-reload</button>
    </div>
    <img src="/results/{{id}}.jpg" alt="test image" id="img" class="preview-image">
    <div class="popup-overlay" id="imagePopup">
        <div class="popup-content">
            <img src="/results/{{id}}.jpg" alt="test image">
        </div>
    </div>
    <script>
      // we have to make a get request to our current path + /reload
      document.getElementById('reload-button').addEventListener('click', function () {
        // check every 200ms if /metadata returns a 200 status code, and if so, reload the page
        var interval = setInterval(function () {
          var xhr = new XMLHttpRequest()
          xhr.open('GET', 'http://localhost:3000/metadata', true)
          xhr.onreadystatechange = function () {
            if (xhr.readyState === 4 && xhr.status === 200) {
              clearInterval(interval)
              window.location.reload()
            }
          }
          xhr.send()
        }, 200)

        // setinterval that reloads the page every 2 seconds if the metadata endpoint is availabl
      })

      setTimeout(function () {
        const data = localStorage.getItem('ditto:reload')
        console.log(data)
        const enabled = parseInt(data)
        if (!enabled) return
        var xhr = new XMLHttpRequest()
        xhr.open('GET', 'http://localhost:3000/metadata', true)
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4 && xhr.status === 200) {
            window.location.reload()
          }
        }
        xhr.send()
      }, 2000)
    </script>
</div>
<script>
  const img = document.querySelector('.preview-image');
  const popup = document.getElementById('imagePopup');

  img.addEventListener('mouseenter', () => {
    popup.style.display = 'flex';
  });

  popup.addEventListener('mouseleave', () => {
    popup.style.display = 'none';
  });

  // Close on click outside
  document.addEventListener('click', (e) => {
    if (!popup.contains(e.target) && e.target !== img) {
      popup.style.display = 'none';
    }
  });

  // Close on Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      popup.style.display = 'none';
    }
  });
</script>
</body>
</html>
